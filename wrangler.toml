name = "yun-perfume"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[[d1_databases]]
binding = "DB"
database_name = "yun-perfume-db"
database_id = "REPLACE_AFTER_PHASE_1"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "yun-perfume-images"

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_AFTER_PHASE_2"
preview_id = "REPLACE_AFTER_PHASE_2"

[vars]
NODE_ENV = "production"
NEXT_PUBLIC_APP_URL = "https://yunperfume.com"
